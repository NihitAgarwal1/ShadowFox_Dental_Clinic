<section class="page-section page-treatments">
  <div class="page-intro">
    <span>Our treatments</span>
    <h1>Treatments designed for comfort and confidence.</h1>
    <p>
      Select any treatment to view the key details. Click the same card again to return to the
      treatment name.
    </p>
  </div>

  <div class="treatment-grid" aria-label="Dental treatments">
    <div
      class="treatment-card"
      *ngFor="let treatment of treatments; let index = index"
      role="button"
      tabindex="0"
      [class.is-expanded]="treatment.expanded"
      [attr.aria-expanded]="treatment.expanded"
      (click)="toggleTreatment(treatment)"
      (keydown.enter)="toggleTreatment(treatment)"
      (keydown.space)="toggleTreatment(treatment); $event.preventDefault()"
    >
      <div class="treatment-name" *ngIf="!treatment.expanded">
        <span>{{ index + 1 | number: '2.0-0' }}</span>
        <h2>{{ treatment.name }}</h2>
        <p>Click to view details</p>
      </div>

      <div class="treatment-details" *ngIf="treatment.expanded">
        <span>{{ treatment.name }}</span>
        <ul>
          <li *ngFor="let detail of treatment.details">{{ detail }}</li>
        </ul>
      </div>
    </div>
  </div>
</section>
